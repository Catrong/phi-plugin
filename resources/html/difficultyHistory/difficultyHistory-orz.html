<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./difficultyHistory.css" />
  </head>

  <html>
    <body>
      <div class="background">
        <img src="../../original_ill/illBlur/996.李化禹.png" alt="曲绘-模糊" />
      </div>

      <div class="header">
        <div class="ill-box">
          <img src="../../original_ill/ill/996.李化禹.png" alt="曲绘" />
        </div>
        <div class="title-box">
          <div class="white-bar"></div>
          <div class="title-content">
            <div class="title">
              <p>上线版本&日期</p>
            </div>
            <div class="content">
              <p>版本: v0.0.00.0</p>
              <p>日期: 0000-00-00</p>
            </div>
            <div class="title">
              <p>定数变化折线图</p>
            </div>
            <div class="content">
              <div class="chart-container">
                <svg id="difficultyChart" width="800" height="250"></svg>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="difficulty">
        <div class="AT-box a-box">
          <div class="dif-box clip-box">
            <p>AT</p>
          </div>
          <div class="data-box">
            <div class="a-num">
              <div class="num-box clip-box">
                <p>15.0</p>
              </div>
              <div class="ver-box clip-box">
                <div class="update-ver">
                  <p>v0.0.00.0</p>
                </div>
                <div class="update-date">
                  <p>0000-00-00</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="IN-box a-box">
          <div class="dif-box clip-box">
            <p>IN</p>
          </div>
          <div class="data-box">
            <div class="a-num">
              <div class="num-box clip-box">
                <p>15.0</p>
              </div>
              <div class="ver-box clip-box">
                <div class="update-ver">
                  <p>v0.0.00.0</p>
                </div>
                <div class="update-date">
                  <p>0000-00-00</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="HD-box a-box">
          <div class="dif-box clip-box">
            <p>HD</p>
          </div>
          <div class="data-box">
            <div class="a-num">
              <div class="num-box clip-box">
                <p>15.0</p>
              </div>
              <div class="ver-box clip-box">
                <div class="update-ver">
                  <p>v0.0.00.0</p>
                </div>
                <div class="update-date">
                  <p>0000-00-00</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="EZ-box a-box">
          <div class="dif-box clip-box">
            <p>EZ</p>
          </div>
          <div class="data-box">
            <div class="a-num">
              <div class="num-box clip-box">
                <p>15.0</p>
              </div>
              <div class="ver-box clip-box">
                <div class="update-ver">
                  <p>v0.0.00.0</p>
                </div>
                <div class="update-date">
                  <p>0000-00-00</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="createdbox">
        <div class="phi-plugin">
          <p>{{_plugin}}</p>
        </div>
        <div class="ver">
          <p>{{Version.ver}}</p>
        </div>
      </div>
      <script>
        // 将颜色转为半透明（用于虚线）
        function lightenColor(hex, alpha = 0.4) {
          // 支持 #RRGGBB 格式
          const r = parseInt(hex.slice(1, 3), 16)
          const g = parseInt(hex.slice(3, 5), 16)
          const b = parseInt(hex.slice(5, 7), 16)
          return `rgba(${r},${g},${b},${alpha})`
        }

        // 绘制定数变化折线图的函数
        // lines: { data: [{x, xLabel, visX, y, yLabel, visY}], color: string }[]
        function drawDifficultyChart(svgId, lines) {
          // 获取SVG元素
          const svg = document.getElementById(svgId)
          if (!svg) {
            console.error("SVG元素未找到:", svgId)
            return
          }

          // 清空SVG内容
          svg.innerHTML = ""

          // 设置SVG尺寸
          const width = parseInt(svg.getAttribute("width")) || 800
          const height = parseInt(svg.getAttribute("height")) || 400

          // 定义边距
          const margin = { top: 30, right: 30, bottom: 50, left: 60 }
          const innerWidth = width - margin.left - margin.right
          const innerHeight = height - margin.top - margin.bottom

          // 创建主绘图区域组
          const g = document.createElementNS("http://www.w3.org/2000/svg", "g")
          g.setAttribute("transform", `translate(${margin.left},${margin.top})`)
          svg.appendChild(g)

          // 汇总所有折线的数据，计算全局范围
          const allData = lines.flatMap(l => l.data)
          const xValues = allData.map(d => d.x)
          const yValues = allData.map(d => d.y)
          const xMin = Math.min(...xValues)
          const xMax = Math.max(...xValues)
          const yMin = Math.min(...yValues)
          const yMax = Math.max(...yValues)

          // 添加一些边距，避免数据点落在轴上
          const xPadding = (xMax - xMin) * 0.1 || 1
          const yPadding = (yMax - yMin) * 0.1 || 1
          const xScaleMin = xMin - xPadding
          const xScaleMax = xMax + xPadding
          const yScaleMin = yMin - yPadding
          const yScaleMax = yMax + yPadding

          // 缩放函数
          const xScale = value => {
            return ((value - xScaleMin) / (xScaleMax - xScaleMin)) * innerWidth
          }
          const yScale = value => {
            return innerHeight - ((value - yScaleMin) / (yScaleMax - yScaleMin)) * innerHeight
          }

          // 绘制X轴
          const xAxis = document.createElementNS("http://www.w3.org/2000/svg", "line")
          xAxis.setAttribute("x1", 0)
          xAxis.setAttribute("y1", innerHeight)
          xAxis.setAttribute("x2", innerWidth)
          xAxis.setAttribute("y2", innerHeight)
          xAxis.setAttribute("stroke", "white")
          xAxis.setAttribute("stroke-width", 1)
          g.appendChild(xAxis)

          // 绘制Y轴
          const yAxis = document.createElementNS("http://www.w3.org/2000/svg", "line")
          yAxis.setAttribute("x1", 0)
          yAxis.setAttribute("y1", 0)
          yAxis.setAttribute("x2", 0)
          yAxis.setAttribute("y2", innerHeight)
          yAxis.setAttribute("stroke", "white")
          yAxis.setAttribute("stroke-width", 1)
          g.appendChild(yAxis)

          // 绘制X轴刻度
          const xTicks = 5
          for (let i = 0; i <= xTicks; i++) {
            const value = xScaleMin + (i / xTicks) * (xScaleMax - xScaleMin)
            const x = xScale(value)
            const tick = document.createElementNS("http://www.w3.org/2000/svg", "line")
            tick.setAttribute("x1", x)
            tick.setAttribute("y1", innerHeight)
            tick.setAttribute("x2", x)
            tick.setAttribute("y2", innerHeight + 6)
            tick.setAttribute("stroke", "white")
            g.appendChild(tick)
          }

          // 绘制Y轴刻度
          const yTicks = 5
          for (let i = 0; i <= yTicks; i++) {
            const value = yScaleMin + (i / yTicks) * (yScaleMax - yScaleMin)
            const y = yScale(value)
            const tick = document.createElementNS("http://www.w3.org/2000/svg", "line")
            tick.setAttribute("x1", -6)
            tick.setAttribute("y1", y)
            tick.setAttribute("x2", 0)
            tick.setAttribute("y2", y)
            tick.setAttribute("stroke", "white")
            g.appendChild(tick)
          }

          // 遍历每条折线
          lines.forEach(line => {
            const data = line.data
            const color = line.color || "#64B5F6"
            const dashColor = lightenColor(color, 0.4)

            // 绘制折线路径
            if (data.length > 1) {
              let pathData = ""
              data.forEach((d, i) => {
                const x = xScale(d.x)
                const y = yScale(d.y)
                if (i === 0) {
                  pathData += `M ${x} ${y}`
                } else {
                  pathData += ` L ${x} ${y}`
                }
              })
              const path = document.createElementNS("http://www.w3.org/2000/svg", "path")
              path.setAttribute("d", pathData)
              path.setAttribute("fill", "none")
              path.setAttribute("stroke", color)
              path.setAttribute("stroke-width", 2)
              g.appendChild(path)
            }

            // 绘制数据点、虚线和标签
            data.forEach(d => {
              const x = xScale(d.x)
              const y = yScale(d.y)

              // 绘制数据点
              const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle")
              circle.setAttribute("cx", x)
              circle.setAttribute("cy", y)
              circle.setAttribute("r", 4)
              circle.setAttribute("fill", color)
              g.appendChild(circle)

              // 如果visX为true，绘制向X轴的虚线并标注xLabel
              if (d.visX) {
                const dashLine = document.createElementNS("http://www.w3.org/2000/svg", "line")
                dashLine.setAttribute("x1", x)
                dashLine.setAttribute("y1", y)
                dashLine.setAttribute("x2", x)
                dashLine.setAttribute("y2", innerHeight)
                dashLine.setAttribute("stroke", dashColor)
                dashLine.setAttribute("stroke-width", 1)
                dashLine.setAttribute("stroke-dasharray", "4,2")
                g.appendChild(dashLine)

                const label = document.createElementNS("http://www.w3.org/2000/svg", "text")
                label.setAttribute("x", x)
                label.setAttribute("y", innerHeight + 15)
                label.setAttribute("text-anchor", "middle")
                label.setAttribute("font-size", "11px")
                label.setAttribute("fill", color)
                label.textContent = d.xLable || d.xLabel || ""
                g.appendChild(label)
              }

              // 如果visY为true，绘制向Y轴的虚线并标注yLabel
              if (d.visY) {
                const dashLine = document.createElementNS("http://www.w3.org/2000/svg", "line")
                dashLine.setAttribute("x1", x)
                dashLine.setAttribute("y1", y)
                dashLine.setAttribute("x2", 0)
                dashLine.setAttribute("y2", y)
                dashLine.setAttribute("stroke", dashColor)
                dashLine.setAttribute("stroke-width", 1)
                dashLine.setAttribute("stroke-dasharray", "4,2")
                g.appendChild(dashLine)

                const label = document.createElementNS("http://www.w3.org/2000/svg", "text")
                label.setAttribute("x", -10)
                label.setAttribute("y", y)
                label.setAttribute("text-anchor", "end")
                label.setAttribute("dominant-baseline", "middle")
                label.setAttribute("font-size", "11px")
                label.setAttribute("fill", color)
                label.textContent = d.yLable || d.yLabel || ""
                g.appendChild(label)
              }
            })
          })
        }

        // 测试示例数据 - 多条折线
        const sampleLines = [
          {
            color: "#64B5F6",
            data: [
              { x: 1, xLable: "v1.0", visX: true, y: 14, yLable: "14.0", visY: true },
              { x: 2, xLable: "v1.1", visX: false, y: 15, yLable: "15.0", visY: false },
              { x: 3, xLable: "v2.0", visX: true, y: 14.5, yLable: "14.5", visY: true },
              { x: 4, xLable: "v2.1", visX: false, y: 13.9, yLable: "13.9", visY: true },
              { x: 5, xLable: "v3.0", visX: true, y: 15.5, yLable: "15.5", visY: false },
            ],
          },
          {
            color: "#FF6B6B",
            data: [
              { x: 1, xLable: "v1.0", visX: false, y: 12, yLable: "12.0", visY: true },
              { x: 2, xLable: "v1.1", visX: true, y: 13, yLable: "13.0", visY: false },
              { x: 3, xLable: "v2.0", visX: false, y: 12.8, yLable: "12.8", visY: false },
              { x: 4, xLable: "v2.1", visX: true, y: 14, yLable: "14.0", visY: true },
              { x: 5, xLable: "v3.0", visX: false, y: 13.5, yLable: "13.5", visY: false },
            ],
          },
        ]

        // 页面加载后绘制图表
        window.addEventListener("DOMContentLoaded", () => {
          drawDifficultyChart("difficultyChart", sampleLines)
        })
      </script>
    </body>
  </html>
</html>
