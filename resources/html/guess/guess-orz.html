<head>
  <link rel="stylesheet" href="./guess.css" />
</head>

<body>
  <svg width="0" height="0" style="position: absolute">
    <filter id="lineArtBetter">
      <!-- 转灰度 -->
      <feColorMatrix type="saturate" values="0" in="SourceGraphic" result="gray" />

      <!-- 反相 -->
      <feComponentTransfer in="gray">
        <feFuncR type="linear" slope="-1" intercept="1" />
        <feFuncG type="linear" slope="-1" intercept="1" />
        <feFuncB type="linear" slope="-1" intercept="1" />
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="1" result="blur" />

      <!-- 颜色减淡混合 (类似 Photoshop 的“颜色减淡”) -->
      <feBlend mode="color-dodge" in="blur" in2="gray" result="sketch" />

      <!-- 增强线条对比度 -->
      <feComponentTransfer in="sketch">
        <feFuncR type="linear" slope="3" intercept="-2" />
        <feFuncG type="linear" slope="3" intercept="-2" />
        <feFuncB type="linear" slope="3" intercept="-2" />
      </feComponentTransfer>
    </filter>
  </svg>
  <div class="ans">
    <img src="../../original_ill/ill/InvertedWorld.ARForest.png" alt="答案" />
  </div>
  <div
    class="img"
    style="
      width: 1000px;
      height: 200px;
      margin-left: 100px;
      margin-top: 100px;
      border: 1px solid #888;
      filter: drop-shadow(0 0 5px #fff);
    "
  >
    <img
      src="../../original_ill/ill/InvertedWorld.ARForest.png"
      alt="曲绘"
      style="margin-left: -100px; margin-top: -100px; filter: url(#lineArtBetter)"
    />
  </div>
</body>
