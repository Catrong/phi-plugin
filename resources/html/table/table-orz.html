<head>
  <link rel="stylesheet" href="./table.css" />
</head>

<body>
  <div class="background">
    <img src="../../original_ill/illBlur/ShineAfter.ADeanJocularACE.png" alt="曲绘-模糊" id="bkg" />
  </div>
  <div class="row titleRow">
    <div class="title">
      <div class="phigrosTitle">
        <p class="phigros-title-font">Phigros</p>
      </div>
      <div class="title-line">
        <div class="titleDesc">
          <p>Constant Table</p>
        </div>
        <div class="phigrosVersion clip-box">
          <p>3.18.3</p>
        </div>
      </div>
    </div>
    <div class="queryDifficulty">
      <div class="qdBox">
        <div class="query">
          <p>Difficulty</p>
        </div>
        <div class="total">
          <p>Total: 18</p>
        </div>
        <div class="index clip-box">
          <div class="query">
            <p>Difficulty</p>
          </div>
          <p>15</p>
          <div class="total">
            <p>Total: 18</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="row playerInfoRow">
    <div class="playerInfo">
      <div class="blackBlock clip-box"></div>
      <div class="avatar clip-box">
        <img src="../avatar/-SURREALISM-.png" alt="{{gameuser.avatar}}" />
      </div>
      <div class="playerId">
        <p>就是不会告诉你</p>
      </div>
      <div class="rks clip-box">
        <p>14.0000</p>
      </div>
      <div class="clgBox">
        <div class="Challenge">
          <img src="../otherimg/5.png" alt="Challenge" />
          <p>54</p>
        </div>
      </div>
      <div class="date">
        <p>2025 Feb.02 00:00:00</p>
      </div>
      <div class="dataBox clip-box">
        <img src="../otherimg/data.png" alt="data" />
        <p>114PB 514GB</p>
      </div>
      <div class="spInfo colorful-background clip-box">
        <p>AP only</p>
      </div>
    </div>
  </div>
  <div class="tableBox">
    <div class="label">
      <div class="labelHead">
        <div class="heng">
          <div class="line clip-box"></div>
        </div>
        <div class="shu leftSlopeAbsolute">
          <div class="line clip-box"></div>
        </div>
      </div>
      <div class="labelContentBox">
        <div class="labelContent clip-box">
          <p>15.1</p>
        </div>
        <div class="labelContent clip-box">
          <img src="../otherimg/phi.png" alt="score" />
        </div>
      </div>
    </div>
    <div class="content">
      <div class="song table-EZ">
        <div class="ill clip-box">
          <img src="../../original_ill/illLow/BoundedQuietude.FiniteLimitvsSiLiS.png" alt="ill" />
          <div class="score">
            <p>99.81</p>
          </div>
        </div>
        <div class="rank-box">
          <div class="rank clip-box">
            <div class="rankBlock clip-box"></div>
            <p>IN</p>
          </div>
        </div>
      </div>
      <div class="song table-HD">
        <div class="ill clip-box">
          <img src="../../original_ill/illLow/BoundedQuietude.FiniteLimitvsSiLiS.png" alt="ill" />
          <div class="score">
            <img src="../otherimg/phi.png" alt="score" />
          </div>
        </div>
        <div class="rank clip-box">
          <div class="rankBlock clip-box"></div>
          <p>IN</p>
        </div>
      </div>
      <div class="song table-IN">
        <div class="ill clip-box">
          <img src="../../original_ill/illLow/BoundedQuietude.FiniteLimitvsSiLiS.png" alt="ill" />
        </div>
        <div class="rank clip-box">
          <div class="rankBlock clip-box"></div>
          <p>IN</p>
        </div>
      </div>
      <div class="song table-AT">
        <div class="ill clip-box">
          <img src="../../original_ill/illLow/BoundedQuietude.FiniteLimitvsSiLiS.png" alt="ill" />
        </div>
        <div class="rank AT-BKG clip-box">
          <div class="rankBlock clip-box"></div>
          <p>AT</p>
        </div>
      </div>
      <div class="song table-IN">
        <div class="ill clip-box">
          <img src="../../original_ill/illLow/BoundedQuietude.FiniteLimitvsSiLiS.png" alt="ill" />
        </div>
        <div class="rank clip-box">
          <div class="rankBlock clip-box"></div>
          <p>IN</p>
        </div>
      </div>
      <div class="song table-IN">
        <div class="ill clip-box">
          <img src="../../original_ill/illLow/BoundedQuietude.FiniteLimitvsSiLiS.png" alt="ill" />
        </div>
        <div class="rank clip-box">
          <div class="rankBlock clip-box"></div>
          <p>IN</p>
        </div>
      </div>
      <div class="song table-IN">
        <div class="ill clip-box">
          <img src="../../original_ill/illLow/BoundedQuietude.FiniteLimitvsSiLiS.png" alt="ill" />
        </div>
        <div class="rank clip-box">
          <div class="rankBlock clip-box"></div>
          <p>IN</p>
        </div>
      </div>
      <div class="song table-IN">
        <div class="ill clip-box">
          <img src="../../original_ill/illLow/BoundedQuietude.FiniteLimitvsSiLiS.png" alt="ill" />
        </div>
        <div class="rank clip-box">
          <div class="rankBlock clip-box"></div>
          <p>IN</p>
        </div>
      </div>
      <div class="song table-IN">
        <div class="ill clip-box">
          <img src="../../original_ill/illLow/BoundedQuietude.FiniteLimitvsSiLiS.png" alt="ill" />
        </div>
        <div class="rank clip-box">
          <div class="rankBlock clip-box"></div>
          <p>IN</p>
        </div>
      </div>
    </div>
    <div class="label">
      <div class="labelHead">
        <div class="heng">
          <div class="line clip-box"></div>
        </div>
        <div class="shu leftSlopeAbsolute">
          <div class="line clip-box"></div>
        </div>
      </div>
      <div class="labelContentBox">
        <div class="labelContent clip-box">
          <p>15.2</p>
        </div>
        <div class="labelContent clip-box">
          <img src="../otherimg/S.png" alt="score" />
        </div>
      </div>
    </div>
    <div class="content">
      <div class="song table-EZ">
        <div class="ill clip-box">
          <img src="../../original_ill/illLow/BoundedQuietude.FiniteLimitvsSiLiS.png" alt="ill" />
        </div>
        <div class="rank clip-box">
          <div class="rankBlock clip-box"></div>
          <p>IN</p>
        </div>
      </div>
    </div>
  </div>
  <div class="createdbox">
    <div class="phi-plugin">
      <p>{{_plugin}}</p>
    </div>
    <div class="ver">
      <p>{{Version.ver}}</p>
    </div>
  </div>
</body>
